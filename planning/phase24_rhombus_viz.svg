  <!--
  Flat-top hex, HEX_SIZE R=42.
  Vertices (relative to centre): v0=(+42,0) v1=(+21,+36.37) v2=(-21,+36.37)
                                  v3=(-42,0) v4=(-21,-36.37) v5=(+21,-36.37)

  Three rhombuses — each is [centre, two adjacent vertices, connecting vertex]:
    Slot 0 (upper-right): C, v4, v5, v0   centroid=(+10.5,-18.19)
    Slot 1 (left):        C, v2, v3, v4   centroid=(-21,    0)
    Slot 2 (bottom):      C, v0, v1, v2   centroid=(+10.5,+18.19)

  Each rhombus is scaled 80% toward its own centroid (f=0.80) to leave a visible gap.

  Shrunk offsets relative to hex centre:
    R0: (+2.1,-3.6)  (-14.7,-32.7)  (+18.9,-32.7)  (+35.7,-3.6)
    R1: (-4.2, 0)    (-21,  +29.1)  (-37.8,  0)    (-21,  -29.1)
    R2: (+2.1,+3.6)  (+35.7,+3.6)   (+18.9,+32.7)  (-14.7,+32.7)
-->
